<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroFramework Demo</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <h1>MicroFramework</h1>
        <p>A lightweight Java web framework for REST services and static file management.</p>

        <div class="demo-section">
            <h2>REST API Demo</h2>

            <div class="api-test">
                <h3>GET /hello</h3>
                <label for="nameInput">Enter your name:</label>
                <input type="text" id="nameInput" placeholder="Pedro">
                <button onclick="testHello()">Say Hello</button>
                <div id="helloResult" class="result"></div>
            </div>

            <div class="api-test">
                <h3>GET /pi</h3>
                <button onclick="testPi()">Get Pi Value</button>
                <div id="piResult" class="result"></div>
            </div>
        </div>
    </div>
    <script src="/app.js"></script>
</body>
</html>
